<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      .mindar-ui-scanning, .mindar-ui-loading { display: none !important; }

      #status-text {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
        background: rgba(0,0,0,0.55);
        color: #fff;
        border-radius: 20px;
        padding: 8px 20px;
        font-size: 13px;
        font-family: sans-serif;
        text-align: center;
        white-space: nowrap;
      }

      #lock-btn {
        position: fixed;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
        background: rgba(255,255,255,0.2);
        color: #fff;
        border: 2px solid #fff;
        border-radius: 30px;
        padding: 12px 32px;
        font-size: 16px;
        font-family: sans-serif;
        font-weight: bold;
        backdrop-filter: blur(8px);
        display: none;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }

      #lock-btn.locked {
        background: rgba(0,200,100,0.4);
        border-color: #00CC66;
        color: #00FF88;
      }

      #locked-overlay {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        z-index: 888;
        display: none;
        pointer-events: none;
      }

      #locked-overlay img {
        position: absolute;
        object-fit: contain;
      }

      /* ตำแหน่งแต่ละรูปบนหน้าจอตอน Lock */
      #img-aluminum   { width: 18vw; top: 15%; left: 8%; }
      #img-worker     { width: 20vw; top: 52%; left: 5%; }
      #img-machine    { width: 24vw; top: 12%; right: 5%; }
      #img-robot      { width: 20vw; top: 38%; right: 5%; }
      #img-cnc        { width: 20vw; top: 62%; right: 5%; }
      #img-supervisor { width: 13vw; top: 58%; left: 42%; }
      #img-gif        { width: 20vw; top: 35%; left: 40%; }
    </style>
  </head>
  <body>

    <div id="status-text">📷 ส่องกล้องไปที่ Poster</div>
    <button id="lock-btn">🔓 Lock ภาพไว้</button>

    <!-- Overlay ตอน Lock -->
    <div id="locked-overlay">
      <img id="img-aluminum"   src="./Gemini_Generated_Image_4gxeom4gxeom4gxe-removebg-preview.png"/>
      <img id="img-worker"     src="./Gemini_Generated_Image_c852llc852llc852-removebg-preview.png"/>
      <img id="img-machine"    src="./Gemini_Generated_Image_35ws6235ws6235ws-removebg-preview.png"/>
      <img id="img-robot"      src="./Gemini_Generated_Image_2db6uk2db6uk2db6-removebg-preview.png"/>
      <img id="img-cnc"        src="./Gemini_Generated_Image_oz8sahoz8sahoz8s-removebg-preview.png"/>
      <img id="img-supervisor" src="./Gemini_Generated_Image_wjsw71wjsw71wjsw-removebg-preview.png"/>
      <img id="img-gif"        src="./Tuv-dance-ezgif_com-optimize.gif"/>
    </div>

    <a-scene
      mindar-image="imageTargetSrc: ./targets.mind;"
      color-space="sRGB"
      renderer="colorManagement: true, sortObjects: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets>
        <img id="robot"      src="./Gemini_Generated_Image_2db6uk2db6uk2db6-removebg-preview.png" crossorigin="anonymous"/>
        <img id="machine"    src="./Gemini_Generated_Image_35ws6235ws6235ws-removebg-preview.png" crossorigin="anonymous"/>
        <img id="aluminum"   src="./Gemini_Generated_Image_4gxeom4gxeom4gxe-removebg-preview.png" crossorigin="anonymous"/>
        <img id="worker"     src="./Gemini_Generated_Image_c852llc852llc852-removebg-preview.png" crossorigin="anonymous"/>
        <img id="cnc"        src="./Gemini_Generated_Image_oz8sahoz8sahoz8s-removebg-preview.png" crossorigin="anonymous"/>
        <img id="supervisor" src="./Gemini_Generated_Image_wjsw71wjsw71wjsw-removebg-preview.png" crossorigin="anonymous"/>
        <img id="person-gif" src="./Tuv-dance-ezgif_com-optimize.gif" crossorigin="anonymous"/>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="ar-target" mindar-image-target="targetIndex: 0">

        <!-- 🔩 อลูมิเนียม — ซ้ายบน -->
        <a-image src="#aluminum"
          width="0.25" height="0.2"
          position="-0.38 0.28 0.05">
        </a-image>

        <!-- 👷 คนงาน — ซ้ายล่าง -->
        <a-image src="#worker"
          width="0.28" height="0.38"
          position="-0.35 -0.22 0.05">
        </a-image>

        <!-- ⚙️ เครื่องจักร — ขวาบน -->
        <a-image src="#machine"
          width="0.32" height="0.25"
          position="0.35 0.3 0.05">
        </a-image>

        <!-- 🦾 Robot Arm — กลางขวา -->
        <a-image src="#robot"
          width="0.28" height="0.28"
          position="0.38 0.05 0.05">
        </a-image>

        <!-- 🏭 CNC — ขวาล่าง -->
        <a-image src="#cnc"
          width="0.28" height="0.32"
          position="0.35 -0.2 0.05">
        </a-image>

        <!-- 👨‍💼 Supervisor — กลางล่าง -->
        <a-image src="#supervisor"
          width="0.18" height="0.32"
          position="0.08 -0.22 0.05">
        </a-image>

        <!-- 🕺 GIF — กลาง poster -->
        <a-image src="#person-gif"
          width="0.28" height="0.38"
          position="0 0.05 0.06">
        </a-image>

      </a-entity>
    </a-scene>

    <script>
      const target   = document.querySelector('#ar-target');
      const overlay  = document.getElementById('locked-overlay');
      const lockBtn  = document.getElementById('lock-btn');
      const statusEl = document.getElementById('status-text');
      let isLocked   = false;

      target.addEventListener('targetFound', () => {
        if (!isLocked) {
          lockBtn.style.display = 'block';
          statusEl.textContent  = '✅ เจอ Poster! กด Lock เพื่อล็อคภาพ';
        }
      });

      target.addEventListener('targetLost', () => {
        if (!isLocked) {
          lockBtn.style.display = 'none';
          statusEl.textContent  = '📷 ส่องกล้องไปที่ Poster';
        }
      });

      lockBtn.addEventListener('click', () => {
        if (!isLocked) {
          isLocked = true;
          overlay.style.display = 'block';
          lockBtn.classList.add('locked');
          lockBtn.textContent  = '🔒 Locked! กดเพื่อ Unlock';
          statusEl.textContent = '🔒 ภาพ Lock แล้ว — หันกล้องไปไหนก็ได้!';
        } else {
          isLocked = false;
          overlay.style.display = 'none';
          lockBtn.classList.remove('locked');
          lockBtn.style.display = 'none';
          statusEl.textContent  = '📷 ส่องกล้องไปที่ Poster';
        }
      });
    </script>
  </body>
</html>
