<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      .mindar-ui-scanning, .mindar-ui-loading { display: none !important; }
    </style>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB" renderer="colorManagement: true, sortObjects: true" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;" raycaster="filter: .clickable;"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-entity rotation="0 0 90">
          
          <a-text value="Mr.CR MENU: Select Video" color="#FFFFFF" align="center" position="0 0.8 0" scale="0.6 0.6 0.6" geometry="primitive: plane; width: 1.5; height: 0.2" material="color: #333333; opacity: 0.8"></a-text>

          <a-entity id="btn-ep1" class="clickable" geometry="primitive: plane; width: 0.8; height: 0.25" material="color: #FF0000" position="-0.45 0.3 0" 
                    text="value: EP.1 \n Cost Reduction; color: #FFFFFF; align: center; width: 1.8;">
          </a-entity>

          <a-entity id="btn-ep2" class="clickable" geometry="primitive: plane; width: 0.8; height: 0.25" material="color: #1E90FF" position="0.45 0.3 0" 
                    text="value: EP.2 \n Stop Waste!; color: #FFFFFF; align: center; width: 1.8;">
          </a-entity>
          
        </a-entity>
      </a-entity>
    </a-scene>

    <script>
      // ลิงก์วิดีโอ YouTube ของพี่
      document.querySelector('#btn-ep1').addEventListener('click', function () {
        window.open('https://www.youtube.com/watch?v=6zCB0QYzoXY', '_blank'); 
      });

      document.querySelector('#btn-ep2').addEventListener('click', function () {
        window.open('https://youtu.be/Oc6S1UeHRUw', '_blank');
      });
    </script>
  </body>
</html>
