<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      .mindar-ui-scanning, .mindar-ui-loading { display: none !important; }
    </style>

    <script>
      AFRAME.registerComponent('mobile-tap', {
        init: function () {
          this.el.addEventListener('touchend', (e) => {
            e.preventDefault();
            this.el.emit('click');
          });
        }
      });
    </script>
  </head>
  <body>
    <a-scene
      mindar-image="imageTargetSrc: ./targets.mind;"
      color-space="sRGB"
      renderer="colorManagement: true, sortObjects: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-camera
        position="0 0 0"
        look-controls="enabled: false"
        cursor="fuse: false; rayOrigin: mouse;"
        raycaster="objects: .clickable; near: 0; far: 100"
      ></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <!-- ❌ ลบ rotation="0 0 90" ออกหมดแล้ว -->

        <!-- หัวข้อ: อยู่บนสุด -->
        <a-text
          value="Mr.CR MENU: Select Video"
          color="#FFFFFF"
          align="center"
          position="0 0.65 0.01"
          scale="0.55 0.55 0.55"
          geometry="primitive: plane; width: 2; height: 0.2"
          material="color: #333333; opacity: 0.85"
        ></a-text>

        <!-- ปุ่ม EP.1 : ซ้าย -->
        <a-entity
          id="btn-ep1"
          class="clickable"
          geometry="primitive: plane; width: 0.75; height: 0.28"
          material="color: #E00000; side: double"
          position="-0.42 0.3 0.01"
          text="value: EP.1\nCost Reduction; color: #FFFFFF; align: center; width: 2; wrapCount: 14;"
          mobile-tap
        ></a-entity>

        <!-- ปุ่ม EP.2 : ขวา -->
        <a-entity
          id="btn-ep2"
          class="clickable"
          geometry="primitive: plane; width: 0.75; height: 0.28"
          material="color: #1565C0; side: double"
          position="0.42 0.3 0.01"
          text="value: EP.2\nStop Waste!; color: #FFFFFF; align: center; width: 2; wrapCount: 14;"
          mobile-tap
        ></a-entity>

      </a-entity>
    </a-scene>

    <script>
      document.querySelector('#btn-ep1').addEventListener('click', function () {
        window.open('https://www.youtube.com/watch?v=6zCB0QYzoXY', '_blank');
      });
      document.querySelector('#btn-ep2').addEventListener('click', function () {
        window.open('https://youtu.be/Oc6S1UeHRUw', '_blank');
      });
    </script>
  </body>
</html>
