<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      .mindar-ui-scanning,
      .mindar-ui-loading { display: none !important; }

      /* Overlay ลอยทับกล้อง */
      #ar-overlay {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        pointer-events: none; /* ไม่บังกล้อง AR */
        z-index: 999;
        display: none; /* ซ่อนไว้ก่อน จนกว่า target จะเจอ */
      }

      /* กล่องปุ่มทั้งหมด จัดกึ่งกลางจอ */
      #menu-box {
        position: absolute;
        top: 38%;
        left: 50%;
        transform: translate(-50%, -50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        pointer-events: auto; /* รับ touch ได้ */
      }

      #menu-title {
        background: rgba(40,40,40,0.88);
        color: #fff;
        font-size: 16px;
        font-weight: bold;
        font-family: sans-serif;
        padding: 8px 22px;
        border-radius: 8px;
        white-space: nowrap;
      }

      .btn-row {
        display: flex;
        gap: 12px;
      }

      .ar-btn {
        width: 130px;
        height: 64px;
        border: none;
        border-radius: 10px;
        color: #fff;
        font-family: sans-serif;
        font-size: 15px;
        font-weight: bold;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        line-height: 1.3;
        -webkit-tap-highlight-color: transparent;
        box-shadow: 0 3px 10px rgba(0,0,0,0.4);
        text-decoration: none; /* สำหรับ <a> tag */
      }

      #btn-ep1 { background: #CC0000; }
      #btn-ep2 { background: #1254A4; }

      .btn-sub {
        font-size: 11px;
        font-weight: normal;
        opacity: 0.9;
      }
    </style>
  </head>
  <body>

    <!-- ✅ HTML Overlay — ปุ่มจริงๆ บน DOM ไม่ใช่ใน A-Frame -->
    <div id="ar-overlay">
      <div id="menu-box">
        <div id="menu-title">🎬 Mr.CR MENU: Select Video</div>
        <div class="btn-row">
          <!-- ใช้ <a> tag เพื่อให้ iOS ยอมเปิด link จาก user tap จริง -->
          <a id="btn-ep1" class="ar-btn"
             href="https://www.youtube.com/watch?v=6zCB0QYzoXY"
             target="_blank">
            EP.1
            <span class="btn-sub">Cost Reduction</span>
          </a>
          <a id="btn-ep2" class="ar-btn"
             href="https://youtu.be/Oc6S1UeHRUw"
             target="_blank">
            EP.2
            <span class="btn-sub">Stop Waste!</span>
          </a>
        </div>
      </div>
    </div>

    <a-scene
      mindar-image="imageTargetSrc: ./targets.mind;"
      color-space="sRGB"
      renderer="colorManagement: true, sortObjects: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <!-- 3D mascot หรือ object ยังอยู่ใน A-Frame ตามปกติ -->
      </a-entity>
    </a-scene>

    <script>
      const overlay = document.getElementById('ar-overlay');

      // ✅ แสดง overlay เมื่อ MindAR เจอ target
      document.querySelector('[mindar-image-target]')
        .addEventListener('targetFound', () => {
          overlay.style.display = 'block';
        });

      // ✅ ซ่อน overlay เมื่อ target หายไป
      document.querySelector('[mindar-image-target]')
        .addEventListener('targetLost', () => {
          overlay.style.display = 'none';
        });
    </script>
  </body>
</html>
