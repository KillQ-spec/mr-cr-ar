<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      .mindar-ui-scanning, .mindar-ui-loading { display: none !important; }
    </style>
  </head>
  <body>
    <a-scene
      mindar-image="imageTargetSrc: ./targets.mind;"
      color-space="sRGB"
      renderer="colorManagement: true, sortObjects: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets>
        <img id="machine-png"
             src="./Gemini_Generated_Image_35ws6235ws6235ws.png"
             crossorigin="anonymous"/>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">

        <!-- PNG ลอยขึ้นลง -->
        <a-image
          src="#machine-png"
          width="0.6" height="0.6"
          position="0 0.1 0.05"
          animation="property: position;
                     from: 0 0.1 0.05;
                     to: 0 0.18 0.05;
                     dir: alternate; loop: true;
                     dur: 1800; easing: easeInOutSine"
        ></a-image>

        <a-text
          value="PNG (2D)"
          color="#FF4444"
          align="center"
          position="0 -0.25 0.05"
          scale="0.5 0.5 0.5"
        ></a-text>

      </a-entity>
    </a-scene>
  </body>
</html>
