<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      .mindar-ui-scanning, .mindar-ui-loading { display: none !important; }

      #lock-btn {
        position: fixed;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
        background: rgba(255,255,255,0.2);
        color: #fff;
        border: 2px solid #fff;
        border-radius: 30px;
        padding: 12px 32px;
        font-size: 16px;
        font-family: sans-serif;
        font-weight: bold;
        backdrop-filter: blur(8px);
        display: none;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }

      #lock-btn.locked {
        background: rgba(0,200,100,0.4);
        border-color: #00CC66;
        color: #00FF88;
      }

      #status-text {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
        background: rgba(0,0,0,0.5);
        color: #fff;
        border-radius: 20px;
        padding: 8px 20px;
        font-size: 13px;
        font-family: sans-serif;
        backdrop-filter: blur(6px);
        text-align: center;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>

    <div id="status-text">📷 ส่องกล้องไปที่ Poster</div>
    <button id="lock-btn">🔓 Lock ภาพไว้</button>

    <a-scene
      mindar-image="imageTargetSrc: ./targets.mind;"
      color-space="sRGB"
      renderer="colorManagement: true, sortObjects: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets>
        <img id="robot"      src="./Gemini_Generated_Image_2db6uk2db6uk2db6-removebg-preview.png" crossorigin="anonymous"/>
        <img id="machine"    src="./Gemini_Generated_Image_35ws6235ws6235ws-removebg-preview.png" crossorigin="anonymous"/>
        <img id="aluminum"   src="./Gemini_Generated_Image_4gxeom4gxeom4gxe-removebg-preview.png" crossorigin="anonymous"/>
        <img id="worker"     src="./Gemini_Generated_Image_c852llc852llc852-removebg-preview.png" crossorigin="anonymous"/>
        <img id="cnc"        src="./Gemini_Generated_Image_oz8sahoz8sahoz8s-removebg-preview.png" crossorigin="anonymous"/>
        <img id="supervisor" src="./Gemini_Generated_Image_wjsw71wjsw71wjsw-removebg-preview.png" crossorigin="anonymous"/>
      </a-assets>

      <!-- Camera -->
      <a-camera id="main-camera" position="0 0 0" look-controls="enabled: false">
        <!-- ✅ ภาพจะย้ายมาติดกล้องตอน Lock -->
        <a-entity id="locked-content" visible="false">
          <a-image src="#aluminum"   width="0.12" height="0.09"  position="-0.18 0.13 -0.5"></a-image>
          <a-image src="#worker"     width="0.13" height="0.18"  position="-0.17 -0.1 -0.5"></a-image>
          <a-image src="#machine"    width="0.15" height="0.12"  position="0.17 0.14 -0.5"></a-image>
          <a-image src="#robot"      width="0.13" height="0.13"  position="0.18 0.02 -0.5"></a-image>
          <a-image src="#cnc"        width="0.13" height="0.15"  position="0.17 -0.1 -0.5"></a-image>
          <a-image src="#supervisor" width="0.08" height="0.15"  position="0.04 -0.1 -0.5"></a-image>
        </a-entity>
      </a-camera>

      <!-- AR Target -->
      <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        <a-entity id="ar-content">
          <a-image src="#aluminum"   width="0.25" height="0.2"  position="-0.38 0.28 0.05"></a-image>
          <a-image src="#worker"     width="0.28" height="0.38" position="-0.35 -0.22 0.05"></a-image>
          <a-image src="#machine"    width="0.32" height="0.25" position="0.35 0.3 0.05"></a-image>
          <a-image src="#robot"      width="0.28" height="0.28" position="0.38 0.05 0.05"></a-image>
          <a-image src="#cnc"        width="0.28" height="0.32" position="0.35 -0.2 0.05"></a-image>
          <a-image src="#supervisor" width="0.18" height="0.32" position="0.08 -0.22 0.05"></a-image>
        </a-entity>
      </a-entity>

    </a-scene>

    <script>
      const target        = document.querySelector('#ar-target');
      const arContent     = document.querySelector('#ar-content');
      const lockedContent = document.querySelector('#locked-content');
      const lockBtn       = document.getElementById('lock-btn');
      const statusEl      = document.getElementById('status-text');
      let isLocked        = false;

      target.addEventListener('targetFound', () => {
        if (!isLocked) {
          arContent.setAttribute('visible', true);
          lockBtn.style.display = 'block';
          lockBtn.classList.remove('locked');
          lockBtn.textContent  = '🔓 Lock ภาพไว้';
          statusEl.textContent = '✅ เจอ Poster! กด Lock เพื่อล็อคภาพ';
        }
      });

      target.addEventListener('targetLost', () => {
        if (!isLocked) {
          arContent.setAttribute('visible', false);
          lockBtn.style.display = 'none';
          statusEl.textContent  = '📷 ส่องกล้องไปที่ Poster';
        }
      });

      lockBtn.addEventListener('click', () => {
        if (!isLocked) {
          isLocked = true;

          // ✅ ซ่อนภาพที่ผูกกับ poster
          arContent.setAttribute('visible', false);

          // ✅ แสดงภาพที่ติดกับกล้องแทน — หันไปไหนภาพก็ตาม
          lockedContent.setAttribute('visible', true);

          // หยุด tracking
          document.querySelector('a-scene')
            .systems['mindar-image-system'].pauseTracking();

          lockBtn.classList.add('locked');
          lockBtn.textContent  = '🔒 Locked! กดเพื่อ Unlock';
          statusEl.textContent = '🔒 ภาพ Lock แล้ว — หันกล้องไปไหนก็ได้!';

        } else {
          isLocked = false;

          // ✅ กลับมา tracking ใหม่
          lockedContent.setAttribute('visible', false);
          arContent.setAttribute('visible', false);

          document.querySelector('a-scene')
            .systems['mindar-image-system'].resumeTracking();

          lockBtn.classList.remove('locked');
          lockBtn.style.display = 'none';
          statusEl.textContent  = '📷 ส่องกล้องไปที่ Poster';
        }
      });
    </script>
  </body>
</html>
